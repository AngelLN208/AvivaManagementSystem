<p style="margin:0 0 10px;color:#0a786e;font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;">Pago confirmado</p>
<h1 style="margin:0 0 14px;color:#102a2a;font-size:28px;line-height:1.2;">{{heading}}</h1>
<p style="margin:0 0 22px;color:#506663;font-size:15px;line-height:1.7;">Hola, {{recipientName}}. {{message}}</p>
<div style="margin:0 0 22px;border-left:4px solid #0a786e;border-radius:10px;background:#f0faf8;padding:18px 20px;">
  <span style="display:block;color:#667b78;font-size:12px;font-weight:700;text-transform:uppercase;">Constancia</span>
  <strong style="display:block;margin-top:6px;color:#075f58;font-size:20px;">{{receiptNumber}}</strong>
</div>
<p style="margin:0 0 24px;color:#506663;font-size:14px;line-height:1.7;">Puedes revisar el detalle del pago y abrir tu constancia desde el portal de pacientes.</p>
<a href="{{actionUrl}}" style="display:inline-block;border-radius:10px;background:#075f58;padding:13px 20px;color:#ffffff;font-size:14px;font-weight:700;text-decoration:none;">Ver pago y constancia</a>
