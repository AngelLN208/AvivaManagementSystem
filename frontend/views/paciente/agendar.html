<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita - Aviva</title>
    <link rel="stylesheet" href="../../css/portal.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AVIVA</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ubicanos.html">Ubícanos</a>
            <a href="agendar.html" class="active">Agendar Cita</a>
        </div>
    </nav>
    
    <main class="agendar-container">
        <section class="filters-section">
            <div class="filter-row">
                <div class="input-group">
                    <label for="sede">Sede:</label>
                    <select id="sede">
                        <option value="todas">Todas las sedes</option>
                        <option value="los-olivos">Los Olivos</option>
                        <option value="lima-centro">Lima Centro</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="especialidad">Especialidad:</label>
                    <select id="especialidad">
                        <option value="todas">Todas las especialidades</option>
                        <option value="traumatologia">Traumatología</option>
                        <option value="pediatria">Pediatría</option>
                        <option value="cardiologia">Cardiología</option>
                        <option value="gastroenterologia">Gastroenterología</option>
                        <option value="oftalmologia">Oftalmología</option>
                    </select>
                </div>
            </div>
            
            <div class="filter-row">
                <div class="input-group flex-grow">
                    <input type="date" id="fecha-cita">
                </div>
                <div class="input-group search-bar">
                    <input type="text" id="nombre-doctor" placeholder="Buscar por nombre de doctor...">
                </div>
            </div>
        </section>

        <section class="doctors-list" id="lista-doctores">
        
        </section>
    </main>

    <script src="../../js/agendar.js"></script>
</body>
</html>
