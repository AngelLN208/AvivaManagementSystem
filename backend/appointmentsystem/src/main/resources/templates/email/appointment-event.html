<p style="margin:0 0 10px;color:#0a786e;font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;">{{eventLabel}}</p>
<h1 style="margin:0 0 14px;color:#102a2a;font-size:28px;line-height:1.2;">{{heading}}</h1>
<p style="margin:0 0 22px;color:#506663;font-size:15px;line-height:1.7;">Hola, {{recipientName}}. {{message}}</p>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-bottom:24px;border:1px solid #dbe8e5;border-radius:14px;background:#f8fbfa;">
  <tr><td style="padding:18px 20px 8px;color:#667b78;font-size:12px;font-weight:700;text-transform:uppercase;">Fecha y hora</td></tr>
  <tr><td style="padding:0 20px 14px;color:#102a2a;font-size:16px;font-weight:700;">{{appointmentDate}} · {{appointmentTime}}</td></tr>
  <tr><td style="padding:14px 20px 8px;border-top:1px solid #e3ecea;color:#667b78;font-size:12px;font-weight:700;text-transform:uppercase;">Profesional</td></tr>
  <tr><td style="padding:0 20px 18px;color:#102a2a;font-size:15px;font-weight:700;">{{doctorName}} <span style="color:#667b78;font-weight:400;">· {{specialty}}</span></td></tr>
</table>
<a href="{{actionUrl}}" style="display:inline-block;border-radius:10px;background:#075f58;padding:13px 20px;color:#ffffff;font-size:14px;font-weight:700;text-decoration:none;">Ver mis citas</a>
