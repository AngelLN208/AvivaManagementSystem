spring.application.name=appointmentsystem
spring.config.import=optional:file:.env[.properties]
# ========================================
# DATABASE CONFIGURATION
# ========================================
# PostgreSQL con variables de entorno (desde .env)
#spring.datasource.url=${DB_URL}
#spring.datasource.username=${DB_USER}
#spring.datasource.password=${DB_PASSWORD}
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# Alternativa: Usar H2 para desarrollo sin PostgreSQL
spring.datasource.url=jdbc:h2:mem:clinicaaviva
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# ========================================
# JWT CONFIGURATION
# ========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
# ========================================
# LOGGING CONFIGURATION
# ========================================
logging.level.root=INFO
logging.level.com.aviva.appointmentsystem=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
# ========================================
# SERVER CONFIGURATION
# ========================================
server.port=8080
server.servlet.context-path=/
spring.mvc.throw-exception-if-no-handler-found=true
# IMPORTANTE: debe ser true para que Swagger UI sirva sus archivos estáticos (JS, CSS)
spring.web.resources.add-mappings=true
# ========================================
# SWAGGER / OPENAPI CONFIGURATION
# ========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
