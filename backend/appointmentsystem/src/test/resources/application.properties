# Las pruebas usan una base H2 aislada y nunca la PostgreSQL configurada en .env.
spring.config.import=
spring.datasource.url=jdbc:h2:mem:appointmentsystem_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=test-secret-key-with-at-least-thirty-two-bytes-123456789
jwt.expiration=3600000
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

brevo.api-url=https://api.brevo.test/v3
brevo.api-key=test-key
app.mail.from=test@aviva.local
app.mail.from-name=Aviva Test
app.notifications.scheduler-enabled=false
app.seed.enabled=true
